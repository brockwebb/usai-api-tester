# Classification project config

# Model settings
model: "gemini-2.5-flash"
system_prompt: |
  You are a text classifier. You will be given a text and a list of categories.
  Classify the text into exactly one category.
  Respond with ONLY a JSON object in this exact format:
  {"category": "CategoryName", "confidence": 0.85}
  where confidence is your estimated confidence from 0.0 to 1.0.
  Do not include any other text in your response.
max_tokens: 256
temperature: 0.0

# API manager settings
rate_limit: 3
max_retries: 5
backoff_base: 2.0
backoff_jitter: true
log_file: "output/run.jsonl"
checkpoint_file: "output/checkpoint.json"

# Project-specific settings
input_file: "data.csv"
output_dir: "output"
text_column: "text"
categories:
  - Technology
  - Science
  - Business
  - Health
  - Education
  - Government
  - Environment
