# USAi API Tester Configuration
# Non-secret configuration for the USAi API gateway

# Base URL for the USAi API (update with your agency endpoint)
base_url: "https://your-agency-endpoint.usai.gov"

# Default model to use on startup
default_model: "gemini-2.5-flash"

# Available models and metadata
models:
  - id: "gemini-2.5-flash"
    name: "Gemini 2.5 Flash"
    provider: "Google"
    temp_range: [0.0, 2.0]
    temp_default: 1.0

  - id: "gemini-2.5-pro"
    name: "Gemini 2.5 Pro"
    provider: "Google"
    temp_range: [0.0, 2.0]
    temp_default: 1.0

  - id: "claude_3_haiku"
    name: "Claude Haiku 3.5"
    provider: "Anthropic"
    temp_range: [0.0, 1.0]
    temp_default: 0.5

  - id: "claude_4_5_sonnet"
    name: "Claude Sonnet 4.5"
    provider: "Anthropic"
    temp_range: [0.0, 1.0]
    temp_default: 0.5

  - id: "claude_4_5_opus"
    name: "Claude Opus 4.5"
    provider: "Anthropic"
    temp_range: [0.0, 1.0]
    temp_default: 0.5

  - id: "llama3211b"
    name: "Llama 3.2 11B"
    provider: "Meta"
    temp_range: [0.0, 1.0]
    temp_default: 0.5

  - id: "llama4_maverick"
    name: "Llama 4 Maverick"
    provider: "Meta"
    temp_range: [0.0, 1.0]
    temp_default: 0.5

# System prompt (optional, sent with every request)
system_prompt: ""

# Request defaults
max_tokens: 1024
temperature: null  # null = use model default
